name: Check PR
on:
  pull_request:
    branches: [main]
jobs:
  check:
    name: Check and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          # Pinned: extended_text_field 16.0.2 (latest) and simple_icons 14.6.1
          # fail to compile on Flutter >= 3.44 (removed ExtendSelectionByPageIntent,
          # final IconData). Keep in sync with the version used for local builds.
          flutter-version: 3.38.9
          channel: stable
          cache: true
      - run: flutter doctor -v
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
