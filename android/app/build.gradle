plugins {
    id "com.android.application"
    // START: FlutterFire Configuration (disabled temporarily)
    // id 'com.google.gms.google-services'
    // id 'com.google.firebase.firebase-perf'
    // id 'com.google.firebase.crashlytics'
    // END: FlutterFire Configuration
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

// Version used for all androidx.media3 artifacts that power the native Twitch
// ExoPlayer implementation (see android/app/src/main/java/ru/refrosty/player).
// The bundled HlsPlaylistParser is a patched fork of the parser shipped with
// this exact Media3 release, so bumping the version here may require
// re-porting the parser from the matching upstream.
def media3Version = "1.9.3"

android {
    namespace = "ru.refrosty"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "ru.refrosty"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties["keyAlias"]
            keyPassword keystoreProperties["keyPassword"]
            storeFile keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
            storePassword keystoreProperties["storePassword"]
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

dependencies {
    // Media3 / ExoPlayer stack for the native Twitch HLS player.
    implementation "androidx.media3:media3-exoplayer:${media3Version}"
    implementation "androidx.media3:media3-exoplayer-hls:${media3Version}"
    implementation "androidx.media3:media3-ui:${media3Version}"
    implementation "androidx.media3:media3-common:${media3Version}"
    implementation "androidx.media3:media3-datasource-okhttp:${media3Version}"
    // Required by Media3 internals (ListenableFuture, Iterables, ...).
    implementation "com.google.guava:guava:33.3.1-android"
}

flutter {
    source = "../.."
}
